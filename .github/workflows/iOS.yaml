name: iOS CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler: latest
          bundler-cache: true

      - name: Install Gems
        run: bundle install

      - name: Build App
        run: bundle exec fastlane build_local

      - name: Show Build Files
        run: ls -R build

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CICD_Pipelines-IPA
          path: ~/Users/ahex/Downloads/ipaFile
